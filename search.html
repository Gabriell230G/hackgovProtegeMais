<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', Arial, sans-serif;
    background: #fff;
    color: #202124;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    gap: 12px;
  }

  .topbar-left { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #5f6368; }
  .topbar-left i { color: #4285F4; }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #f1f3f4;
    color: #3c4043;
    border: none;
    border-radius: 100px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background .2s;
  }
  .back-btn:hover { background: #e8eaed; }

  /* ── Header com logo + barra ── */
  .search-header {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 8px 24px 14px;
    border-bottom: 1px solid #e8eaed;
    flex-wrap: wrap;
  }

  .logo-small {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1.5px;
    flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    user-select: none;
  }
  .logo-small .s { color: #4285F4; }
  .logo-small .e { color: #EA4335; }
  .logo-small .a { color: #FBBC05; }
  .logo-small .r { color: #4285F4; }
  .logo-small .c { color: #34A853; }
  .logo-small .h { color: #EA4335; }

  .search-row { display: flex; gap: 10px; flex: 1; align-items: center; max-width: 680px; }

  .search-input-wrap { position: relative; flex: 1; }
  .search-input-wrap input {
    width: 100%;
    padding: 12px 48px 12px 18px;
    border: 1px solid #dfe1e5;
    border-radius: 24px;
    font-size: 16px;
    outline: none;
    font-family: inherit;
    color: #202124;
    box-shadow: 0 1px 6px rgba(32,33,36,.08);
    transition: box-shadow .2s, border-color .2s;
  }
  .search-input-wrap input:focus {
    box-shadow: 0 2px 12px rgba(32,33,36,.15);
    border-color: transparent;
  }
  .search-icon-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #4285F4;
    cursor: pointer;
    font-size: 17px;
    padding: 4px;
    transition: color .2s;
  }
  .search-icon-btn:hover { color: #1a73e8; }

  /* ── Nav tabs ── */
  .search-nav {
    display: flex;
    gap: 0;
    padding: 0 24px;
    border-bottom: 1px solid #e8eaed;
    overflow-x: auto;
  }
  .search-nav a {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 11px 16px;
    font-size: 13px;
    color: #5f6368;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: color .15s;
    text-decoration: none;
  }
  .search-nav a i { font-size: 12px; }
  .search-nav a.active { color: #1a73e8; border-bottom-color: #1a73e8; font-weight: 600; }
  .search-nav a:hover { color: #202124; background: #f8f9fa; border-radius: 4px 4px 0 0; }

  /* ── Resultados ── */
  .results-container { max-width: 740px; padding: 20px 24px; flex: 1; }
  .results-info { font-size: 13px; color: #70757a; margin-bottom: 22px; }

  .result-item { margin-bottom: 30px; }
  .result-url {
    font-size: 13px;
    color: #202124;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .site-icon {
    width: 20px;
    height: 20px;
    background: #f1f3f4;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #5f6368;
    flex-shrink: 0;
  }
  .result-breadcrumb { color: #5f6368; font-size: 12px; }

  .result-title {
    font-size: 20px;
    color: #1a0dab;
    margin-bottom: 5px;
    cursor: pointer;
    line-height: 1.3;
    font-weight: 400;
  }
  .result-title:hover { text-decoration: underline; }

  .result-desc { font-size: 14px; color: #4d5156; line-height: 1.58; }
  .result-desc .highlight { font-weight: 700; color: #202124; }

  .result-date { font-size: 13px; color: #70757a; margin-bottom: 2px; }

  hr.result-divider { border: none; border-top: 1px solid #e8eaed; margin: 0 0 22px; }

  /* Featured snippet */
  .featured-snippet {
    border: 1px solid #e8eaed;
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 28px;
    background: #fff;
  }
  .featured-snippet .snippet-title {
    font-size: 13px;
    font-weight: 600;
    color: #5f6368;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .featured-snippet p { font-size: 14px; color: #202124; line-height: 1.6; }
  .featured-snippet .snippet-source { font-size: 12px; color: #70757a; margin-top: 8px; }

  /* ── Pesquisas relacionadas ── */
  .related-section { padding: 20px 24px 40px; max-width: 740px; }
  .related-section h3 { font-size: 20px; color: #202124; margin-bottom: 14px; font-weight: 600; }

  .related-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .related-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px 12px 0;
    border-bottom: 1px solid #e8eaed;
    font-size: 14px;
    color: #202124;
    cursor: pointer;
    transition: color .15s;
  }
  .related-item:hover { color: #1a0dab; }
  .related-icon {
    width: 36px;
    height: 36px;
    background: #f1f3f4;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: #5f6368;
    font-size: 13px;
  }

  /* ── Footer ── */
  .search-footer {
    background: #f2f2f2;
    border-top: 1px solid #e8eaed;
    padding: 15px 24px;
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
    margin-top: auto;
  }
  .search-footer a { font-size: 13px; color: #5f6368; cursor: pointer; text-decoration: none; }
  .search-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <i class="fa-solid fa-shield-halved"></i>
    Protege+ — Modo Seguro ativo
  </div>
  <button class="back-btn" onclick="voltarSistema()">
    <i class="fa-solid fa-arrow-left"></i> Voltar ao sistema
  </button>
</div>

<div class="search-header">
  <div class="logo-small" onclick="voltarSistema()">
    <span class="s">S</span><span class="e">e</span><span class="a">a</span><span class="r">r</span><span class="c">c</span><span class="h">h</span>
  </div>
  <div class="search-row">
    <div class="search-input-wrap">
      <input type="text" id="result-search-input" placeholder="Pesquisar" onkeypress="if(event.key==='Enter')reSearch()">
      <button class="search-icon-btn" onclick="reSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
  </div>
</div>

<nav class="search-nav">
  <a class="active"><i class="fa-solid fa-list"></i> Tudo</a>
  <a><i class="fa-regular fa-newspaper"></i> Notícias</a>
  <a><i class="fa-regular fa-image"></i> Imagens</a>
  <a><i class="fa-solid fa-play"></i> Vídeos</a>
  <a><i class="fa-solid fa-map-location-dot"></i> Mapas</a>
  <a><i class="fa-solid fa-shopping-cart"></i> Shopping</a>
  <a><i class="fa-solid fa-ellipsis"></i> Mais</a>
</nav>

<div class="results-container" id="results-container"></div>
<div class="related-section" id="related-section"></div>

<div class="search-footer">
  <a>Sobre</a><a>Publicidade</a><a>Negócios</a><a>Como funciona a Pesquisa</a>
  <a>Privacidade</a><a>Termos</a><a>Configurações</a>
</div>

<script>
  function getQuery() {
    const params = new URLSearchParams(window.location.search);
    return params.get('q') || localStorage.getItem('safeSearchQuery') || 'pesquisa';
  }

  const query = getQuery();
  const qCap  = query.charAt(0).toUpperCase() + query.slice(1);

  document.getElementById('result-search-input').value = query;
  document.title = query + ' - Search';

  // Redireciona para o Google após breve delay
  setTimeout(() => {
    window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
  }, 900);

  // ── Sites e templates fake ───────────────────────────────────
  const FAKE_SITES = [
    { domain: 'wikipedia.org',    name: 'Wikipédia',  icon: 'W' },
    { domain: 'wikihow.com',      name: 'wikiHow',    icon: 'H' },
    { domain: 'techtudo.com.br',  name: 'TechTudo',   icon: 'T' },
    { domain: 'uol.com.br',       name: 'UOL',        icon: 'U' },
    { domain: 'g1.globo.com',     name: 'G1 Globo',   icon: 'G' },
    { domain: 'terra.com.br',     name: 'Terra',      icon: 'T' },
    { domain: 'r7.com',           name: 'R7',         icon: 'R' },
    { domain: 'estadao.com.br',   name: 'Estadão',    icon: 'E' },
  ];

  const DATES = ['28 de abr. de 2026', '27 de abr. de 2026', '25 de abr. de 2026',
                 '20 de abr. de 2026', '15 de abr. de 2026', '10 de abr. de 2026'];

  const TEMPLATES = [
    (q,s) => ({ url:`https://www.${s.domain}/wiki/${encodeURIComponent(q)}`,      title:`${qCap} – ${s.name}`, desc:`<span class="highlight">${qCap}</span> é um termo amplamente discutido. Saiba mais sobre origem, definição e contexto atual neste artigo completo.` }),
    (q,s) => ({ url:`https://www.${s.domain}/${q.replace(/ /g,'-')}`,             title:`Como ${q} funciona — ${s.name}`, desc:`Descubra tudo sobre <span class="highlight">${q}</span>: guia completo, passo a passo e dicas atualizadas.` }),
    (q,s) => ({ url:`https://www.${s.domain}/noticias/${q.replace(/ /g,'-')}`,    title:`Últimas notícias sobre ${q} — ${s.name}`, desc:`Acompanhe as últimas atualizações sobre <span class="highlight">${q}</span>. Cobertura completa e atualizada.` }),
    (q,s) => ({ url:`https://www.${s.domain}/busca?q=${encodeURIComponent(q)}`,   title:`${qCap}: o que você precisa saber — ${s.name}`, desc:`Tudo sobre <span class="highlight">${q}</span> em um só lugar. Informações confiáveis e atualizadas.` }),
    (q,s) => ({ url:`https://www.${s.domain}/artigo/${q.replace(/ /g,'-')}`,      title:`O que é ${q}? Explicação completa — ${s.name}`, desc:`Entenda de vez o que significa <span class="highlight">${q}</span>, com exemplos práticos e referências.` }),
    (q,s) => ({ url:`https://www.${s.domain}/especial/${q.replace(/ /g,'_')}`,    title:`${qCap} em destaque — ${s.name}`, desc:`Análise aprofundada sobre <span class="highlight">${q}</span>. Especialistas comentam os principais pontos.` }),
    (q,s) => ({ url:`https://www.${s.domain}/videos/${q.replace(/ /g,'+')}`,      title:`Vídeos sobre ${q} — ${s.name}`, desc:`Assista os melhores conteúdos sobre <span class="highlight">${q}</span>. Novos vídeos toda semana.` }),
  ];

  function buildResults() {
    const container = document.getElementById('results-container');
    const total = (Math.floor(Math.random() * 900) + 100) * 1000000;
    const time  = (Math.random() * 0.4 + 0.25).toFixed(2);

    let html = `<div class="results-info">Cerca de ${total.toLocaleString('pt-BR')} resultados (${time} segundos)</div>`;

    // Featured snippet no topo
    html += `
      <div class="featured-snippet">
        <div class="snippet-title"><i class="fa-solid fa-star"></i> Resultado em destaque</div>
        <p><strong>${qCap}</strong> — ${_snippetText(query)}</p>
        <div class="snippet-source">wikipedia.org › wiki › ${query.replace(/ /g,'_')}</div>
      </div>`;

    for (let i = 0; i < 7; i++) {
      const site   = FAKE_SITES[i % FAKE_SITES.length];
      const tpl    = TEMPLATES[i % TEMPLATES.length](query, site);
      const domain = tpl.url.replace('https://www.','').split('/')[0];
      const date   = DATES[i % DATES.length];

      html += `
        <div class="result-item">
          <div class="result-url">
            <div class="site-icon">${site.icon}</div>
            <span class="result-breadcrumb">${domain} › ${query.replace(/ /g,' › ')}</span>
          </div>
          <div class="result-title">${tpl.title}</div>
          <div class="result-date">${date} —</div>
          <div class="result-desc">${tpl.desc}</div>
        </div>`;

      if (i === 2) html += '<hr class="result-divider">';
    }

    container.innerHTML = html;
  }

  function _snippetText(q) {
    const texts = [
      `termo ou conceito amplamente conhecido, com diversas aplicações no cotidiano. Sua definição envolve múltiplos aspectos históricos, sociais e práticos.`,
      `assunto de interesse público com relevância crescente nos últimos anos. Especialistas destacam sua importância em diferentes contextos.`,
      `tema que gera debate e discussão em diversas áreas do conhecimento humano, com definições que variam conforme o campo de estudo.`,
    ];
    return texts[Math.abs(q.length) % texts.length];
  }

  function buildRelated() {
    const related = document.getElementById('related-section');
    const searches = [
      `${query} o que é`,
      `${query} como funciona`,
      `${query} exemplos`,
      `${query} definição`,
      `${query} atualidades`,
      `${query} para iniciantes`,
      `${query} história`,
      `melhor ${query}`,
    ];

    const items = searches.map(s => `
      <div class="related-item" onclick="goSearch('${s.replace(/'/g,"\\'")}')">
        <div class="related-icon"><i class="fa-solid fa-magnifying-glass"></i></div>
        <span>${s}</span>
      </div>`).join('');

    related.innerHTML = `<h3>Pesquisas relacionadas</h3><div class="related-grid">${items}</div>`;
  }

  function reSearch() {
    const q = document.getElementById('result-search-input').value.trim();
    if (q) goSearch(q);
  }

  function goSearch(q) {
    localStorage.setItem('safeSearchQuery', q);
    window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
  }

  function voltarSistema() {
    window.location.href = 'index.html';
  }

  buildResults();
  buildRelated();
</script>
</body>
</html>
